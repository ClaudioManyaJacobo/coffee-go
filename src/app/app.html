<app-loading *ngIf="loadingService.isLoading$ | async"></app-loading>

<div class="app-layout" [class.hidden]="loadingService.isLoading$ | async">
  <app-navbar></app-navbar>

  <main class="viewport">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Mobile blocker overlay -->
<div class="mobile-blocker">
  <div class="mobile-blocker-card">
    <div class="mobile-blocker-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <h3 class="mobile-blocker-title">Aviso de Compatibilidad</h3>
    <p class="mobile-blocker-text">ESTA NUEVA VERSION DE PRUEBA NO ESTA DISPONIBLE EN MODO TELEFONO, ESPERE A LA SIGUIENTE VERSION</p>
  </div>
</div>
