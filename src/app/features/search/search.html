<div class="search-view">
  <div class="header-section">
    <h1 class="search-title">Resultados para: <span class="highlight">"{{ query }}"</span></h1>
  </div>

  <div *ngIf="results.length === 0" class="empty-state">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" class="mb-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
    <h2>No se encontraron resultados</h2>
    <p>Intenta con otras palabras clave o verifica la ortografía.</p>
  </div>

  <div *ngIf="results.length > 0" class="results-grid">
    <div class="card-wrapper" *ngFor="let item of results">
      <app-movie-card [movie]="item"></app-movie-card>
    </div>
  </div>

  <div *ngIf="totalPages > 1" class="pagination-wrapper">
    <button class="btn-page" [disabled]="page === 1" (click)="changePage(page - 1)">
      ❮ Anterior
    </button>
    <span class="page-indicator">Página {{ page }} de {{ totalPages }}</span>
    <button class="btn-page" [disabled]="page === totalPages" (click)="changePage(page + 1)">
      Siguiente ❯
    </button>
  </div>
</div>
