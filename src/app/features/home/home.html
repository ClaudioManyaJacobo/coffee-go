<header class="hero-banner" *ngIf="heroMovie" [style.background-image]="'url(https://image.tmdb.org/t/p/w1280' + heroMovie.backdrop_path + ')'">
  <div class="hero-overlay">
    <div class="hero-content">
      <span class="badge-new">LO MEJOR DEL TOP 5 - PUESTO {{ currentHeroIndex + 1 }}</span>
      <h1 class="hero-title">{{ heroMovie.title || heroMovie.name }}</h1>
      <p class="hero-overview">{{ (heroMovie.overview | slice:0:220) + (heroMovie.overview.length > 220 ? '...' : '') }}</p>
      <div class="hero-actions">
        <button class="btn-play"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:inline;margin-right:5px;vertical-align:-4px;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> REPRODUCIR AHORA</button>
        <button class="btn-info">ⓘ INFO</button>
      </div>
    </div>
  </div>
</header>

<div class="content-container">
  <section class="section-row" *ngIf="trending$ | async as trending">
    <h2 class="row-title">Tendencias de la Semana</h2>
    <div class="carousel-wrapper">
      <div class="carousel-track right-to-left">
        <app-movie-card *ngFor="let item of trending.movies" [movie]="item"></app-movie-card>
        <app-movie-card *ngFor="let item of trending.movies" [movie]="item"></app-movie-card> <!-- Duplicado para infinito -->
      </div>
    </div>
  </section>

  <section class="section-row-mt-5" *ngIf="trending$ | async as trending">
    <h2 class="row-title">Series Top CoffeeGo</h2>
    <div class="carousel-wrapper">
      <div class="carousel-track left-to-right">
        <app-movie-card *ngFor="let item of trending.series" [movie]="item"></app-movie-card>
        <app-movie-card *ngFor="let item of trending.series" [movie]="item"></app-movie-card> <!-- Duplicado para infinito -->
      </div>
    </div>
  </section>
</div>
