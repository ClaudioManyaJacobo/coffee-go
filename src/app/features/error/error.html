<div class="error-container">
  <div class="error-content">
    <div class="glitch-icon">
      <svg width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
        <line x1="12" y1="2" x2="12" y2="12"></line>
      </svg>
    </div>
    <h1 class="gradient-text">Conexión Interrumpida</h1>
    <p class="error-message">
      Mil disculpas, ocurre un problema de comunicación. Nuestros servidores están tomando un café o el enlace con la base de datos se ha roto (posible fallo del Backend o API Key inválida).
    </p>
    <button class="btn-retry" (click)="retry()">
      ↻ Volver a Intentar
    </button>
  </div>
</div>
