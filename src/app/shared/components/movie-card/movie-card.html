<div class="movie-card premium-card" [routerLink]="['/details', mediaType, hashedId]">
  <img *ngIf="movie.poster_path" [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" [alt]="movie.title || movie.name">
  <div *ngIf="!movie.poster_path" class="no-poster-placeholder">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 8h1a4 4 0 1 1 0 8h-1"></path>
      <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path>
      <line x1="6" x2="6" y1="2" y2="4"></line><line x1="10" x2="10" y1="2" y2="4"></line><line x1="14" x2="14" y1="2" y2="4"></line>
    </svg>
    <span class="no-poster-text">NO POSTER</span>
  </div>
  
  <div class="card-overlay">
    <h3>{{ movie.title || movie.name }}</h3>
    <div class="meta">
      <span class="rating"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:inline;margin-right:2px;vertical-align:-1px;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg> {{ movie.vote_average.toFixed(1) }}</span>
      <span class="year">{{ (movie.release_date || movie.first_air_date) | slice:0:4 }}</span>
    </div>
    <div class="overview-text">{{ movie.overview | slice:0:100 }}{{ movie.overview.length > 100 ? '...' : '' }}</div>
  </div>
</div>
