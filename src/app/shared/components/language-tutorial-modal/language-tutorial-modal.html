<div class="modal-overlay" (click)="onClose()">
  <div class="tutorial-card glass-effect animate-fade-in" (click)="$event.stopPropagation()">
    <div class="tutorial-header">
      <h3>Guía para Audio en Español</h3>
    </div>
    <div class="tutorial-steps">
      <div class="step-item">
        <div class="step-num">1</div>
        <div class="step-content">
          <p>Haz clic en el símbolo de <strong>Nube</strong> <svg width="22" height="22" style="vertical-align: middle; margin: 0 4px; color: #a1a1aa;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg> que aparece arriba en el reproductor.</p>
        </div>
      </div>
      <div class="step-item">
        <div class="step-num">2</div>
        <div class="step-content">
          <p>Busca en la lista el servidor que diga <strong>Spanish audio</strong>.</p>
        </div>
      </div>
      <div class="step-item">
        <div class="step-num">3</div>
        <div class="step-content">
          <p>Verifica el estado del título con el ícono a la derecha:</p>
          <div class="status-legend-new">
            <div class="status-mark-new available">
              <div class="icon-circle green">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              </div>
              <span>Disponible (Play Verde)</span>
            </div>
            <div class="status-mark-new unavailable">
              <div class="icon-box red">
                 <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M21 3H3c-1.11 0-2 .89-2 2v12c0 1.1.89 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.11-.9-2-2-2zm0 14H3V5h18v12zm-9-1h2V9h-2v7zm0-9h2V5h-2v2z"/></svg>
              </div>
              <span>No disponible (TV Roja)</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Botón Entendido -->
    <div class="tutorial-footer" style="margin-top: 1.5rem; text-align: right; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 1.5rem;">
      <button class="btn-entendido" (click)="onClose()">
         Entendido <svg style="vertical-align: middle; margin-left: 4px;" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</div>
