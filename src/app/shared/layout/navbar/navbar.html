<nav class="nav-pro" [class.scrolled]="isScrolled">
  <div class="nav-wrapper">
    <div class="nav-left">
      <div class="logo-box" routerLink="/home">
        <svg class="brand-mark" width="22" height="18" viewBox="0 0 22 18" fill="none">
          <rect x="0" y="0" width="22" height="4" rx="2" fill="var(--primary)"/>
          <rect x="0" y="7" width="22" height="4" rx="2" fill="var(--primary)"/>
          <rect x="0" y="14" width="22" height="4" rx="2" fill="var(--primary)"/>
        </svg>
        <span class="logo">ClaudMovie.io</span>
      </div>

      <div class="links-box">
        <div class="nav-links-list">
          <a routerLink="/home" routerLinkActive="active" class="nav-link">
            <span class="link-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </span>
            Inicio
          </a>
          <a routerLink="/movies" routerLinkActive="active" class="nav-link">
            <span class="link-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M17 3v18"/><path d="M3 7h4"/><path d="M3 12h4"/><path d="M3 17h4"/><path d="M17 7h4"/><path d="M17 12h4"/><path d="M17 17h4"/></svg>
            </span>
            Peliculas
          </a>
          <a routerLink="/series" routerLinkActive="active" class="nav-link">
            <span class="link-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="15" x="2" y="7" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
            </span>
            Series
          </a>
        </div>
      </div>
    </div>

    <div class="actions-box">
      <div class="search-bubble">
        <form (submit)="onSearchSubmit($event)" class="search-form">
          <span class="search-ico">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </span>
          <input type="text" [formControl]="searchControl" (focus)="onInputFocus()" (blur)="onInputBlur()" placeholder="Buscar peliculas, series..." class="search-input" autocomplete="off">
          <span class="search-spinner" *ngIf="isLoading"></span>
        </form>
      </div>

      <div class="suggestions-dropdown" [class.visible]="isOpen" (mousedown)="preventBlur($event)">
        <ng-container *ngIf="suggestions.length > 0">
          <div class="suggestion-item" *ngFor="let item of suggestions" (click)="goToDetails(item)">
            <img *ngIf="item.poster_path" [src]="'https://image.tmdb.org/t/p/w92' + item.poster_path" [alt]="item.title || item.name">
            <div *ngIf="!item.poster_path" class="sug-no-img">NC</div>
            <div class="sug-info">
              <h4>{{ item.title || item.name }}</h4>
              <div class="sug-meta">
                <span class="sug-badge">{{ item.media_type === 'movie' ? 'PELICULA' : 'SERIE' }}</span>
                <span class="sug-year" *ngIf="item.release_date || item.first_air_date">{{ (item.release_date || item.first_air_date) | slice:0:4 }}</span>
              </div>
            </div>
          </div>
          <div class="suggestion-footer" (click)="onVerTodos()">Ver todos los resultados</div>
        </ng-container>

        <div class="sug-first-load" *ngIf="isLoading && suggestions.length === 0">
          <span class="sug-spinner"></span>
          <p class="sug-loading-label">Buscando...</p>
        </div>
      </div>
    </div>
  </div>
</nav>
