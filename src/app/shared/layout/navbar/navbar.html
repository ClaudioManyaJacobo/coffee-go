<!-- ── Floating Menu Trigger ─────────────────────────────────────────────── -->
<button class="menu-trigger" (click)="menuOpen = true" title="Abrir menú (M)">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  <span class="trigger-hint">M</span>
</button>

<!-- ── Full-Screen Menu Overlay ───────────────────────────────────────────── -->
<div class="menu-overlay" *ngIf="menuOpen" (click)="closeMenu()">
  <div class="menu-backdrop"></div>
  <div class="menu-center" (click)="$event.stopPropagation()">

    <div class="menu-logo">
      <svg width="32" height="26" viewBox="0 0 24 20" fill="none">
        <rect x="1" y="1" width="22" height="13" rx="2" stroke="var(--primary)" stroke-width="1.5"/>
        <path d="M5 5 L9 5 L5 9" stroke="var(--primary)" stroke-width="1" opacity="0.5"/>
        <path d="M11 14 V16" stroke="var(--primary)" stroke-width="1.5"/>
        <path d="M7 16 H17" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="menu-logo-text">ClaudMovie.io</span>
    </div>

    <div class="menu-grid">
      <a class="menu-item" routerLink="/home" (click)="closeMenu()" (mouseenter)="menuHover = 0" (mouseleave)="menuHover = null" [class.hovered]="menuHover === 0">
        <div class="menu-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <span class="menu-label">Inicio</span>
      </a>

      <a class="menu-item" routerLink="/movies" (click)="closeMenu()" (mouseenter)="menuHover = 1" (mouseleave)="menuHover = null" [class.hovered]="menuHover === 1">
        <div class="menu-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M17 3v18"/><path d="M3 7h4"/><path d="M3 12h4"/><path d="M3 17h4"/><path d="M17 7h4"/><path d="M17 12h4"/><path d="M17 17h4"/></svg>
        </div>
        <span class="menu-label">Películas</span>
      </a>

      <a class="menu-item" routerLink="/series" (click)="closeMenu()" (mouseenter)="menuHover = 2" (mouseleave)="menuHover = null" [class.hovered]="menuHover === 2">
        <div class="menu-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="15" x="2" y="7" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
        </div>
        <span class="menu-label">Series</span>
      </a>

      <div class="menu-item" (click)="openSearch()" (mouseenter)="menuHover = 3" (mouseleave)="menuHover = null" [class.hovered]="menuHover === 3">
        <div class="menu-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <span class="menu-label">Buscar</span>
      </div>
    </div>

    <div class="menu-footer">
      <span>Presiona <kbd>ESC</kbd> para cerrar</span>
    </div>
  </div>
</div>

<!-- ── Search Modal Overlay ───────────────────────────────────────────────── -->
<div class="search-overlay" *ngIf="searchModalOpen" (click)="closeSearch()">
  <div class="search-modal" (click)="$event.stopPropagation()">
    <div class="search-modal-inner">
      <div class="search-modal-field">
        <span class="search-modal-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text"
               [formControl]="searchControl"
               (focus)="onInputFocus()"
               (blur)="onInputBlur()"
               placeholder="Buscar películas, series..."
               class="search-modal-input"
               autocomplete="off"
               #searchInput>
        <span class="search-modal-spinner" *ngIf="isLoading"></span>
        <button class="search-modal-close" (click)="closeSearch()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="search-modal-suggestions" *ngIf="suggestions.length > 0">
        <div class="suggestion-item" *ngFor="let item of suggestions" (click)="goToDetails(item)">
          <img *ngIf="item.poster_path" [src]="'https://image.tmdb.org/t/p/w92' + item.poster_path" [alt]="item.title || item.name" class="sug-poster">
          <div *ngIf="!item.poster_path" class="sug-no-poster">NC</div>
          <div class="sug-info">
            <h4>{{ item.title || item.name }}</h4>
            <div class="sug-meta">
              <span class="sug-badge" [class.movie]="item.media_type === 'movie'" [class.tv]="item.media_type === 'tv'">
                {{ item.media_type === 'movie' ? 'PELÍCULA' : 'SERIE' }}
              </span>
              <span class="sug-year" *ngIf="item.release_date || item.first_air_date">
                {{ (item.release_date || item.first_air_date) | slice:0:4 }}
              </span>
            </div>
          </div>
        </div>
        <div class="suggestion-viewall" (click)="onVerTodos()">Ver todos los resultados</div>
      </div>

      <div class="search-modal-loading" *ngIf="isLoading && suggestions.length === 0">
        <span class="spinner"></span>
        <p>Buscando...</p>
      </div>
    </div>
  </div>
</div>
