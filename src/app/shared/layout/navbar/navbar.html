<nav class="nav-pro" [class.scrolled]="isScrolled">
  <div class="nav-wrapper">
    <div class="nav-left">
      <div class="logo-box" routerLink="/home">
        <span class="logo gradient-text">CoffeeGo</span>
      </div>

      <div class="links-box" [class.open]="isMenuOpen">
        <!-- Buscador integrado en el menú móvil -->
        <div class="search-bubble mobile-search">
          <form (submit)="onSearchSubmit($event)" class="search-form">
            <span class="search-ico" [class.spinning]="isLoading">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </span>
            <input type="text" [formControl]="searchControl" (focus)="onInputFocus()" (blur)="onInputBlur()" placeholder="¿Qué quieres ver hoy?" class="search-input" autocomplete="off">
          </form>
        </div>

        <div class="nav-links-list">
          <a routerLink="/home" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
            <span class="link-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </span> 
            Inicio
          </a>
          <a routerLink="/movies" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
            <span class="link-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M17 3v18"/><path d="M3 7h4"/><path d="M3 12h4"/><path d="M3 17h4"/><path d="M17 7h4"/><path d="M17 12h4"/><path d="M17 17h4"/></svg>
            </span> 
            Películas
          </a>
          <a routerLink="/series" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
            <span class="link-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="15" x="2" y="7" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
            </span> 
            Series
          </a>
        </div>
      </div>
    </div>

    <div class="actions-box">
      <!-- Buscador para Desktop -->
      <div class="search-bubble desktop-search">
        <form (submit)="onSearchSubmit($event)" class="search-form">
          <span class="search-ico" [class.spinning]="isLoading">
            <svg *ngIf="!isLoading" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <svg *ngIf="isLoading" class="spin-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 1 0 10 10" /></svg>
          </span>
          <input type="text" [formControl]="searchControl" (focus)="onInputFocus()" (blur)="onInputBlur()" placeholder="Buscar..." class="search-input" autocomplete="off">
        </form>
      </div>

      <div class="suggestions-dropdown" [class.visible]="isOpen" (mousedown)="preventBlur($event)">
        <div class="sug-shimmer-bar" *ngIf="isLoading"></div>
        <ng-container *ngIf="suggestions.length > 0">
          <div class="suggestion-item" *ngFor="let item of suggestions" (click)="goToDetails(item)">
            <img *ngIf="item.poster_path" [src]="'https://image.tmdb.org/t/p/w92' + item.poster_path" [alt]="item.title || item.name">
            <div *ngIf="!item.poster_path" class="sug-no-img">NC</div>
            <div class="sug-info">
              <h4>{{ item.title || item.name }}</h4>
              <div class="sug-meta">
                <span class="sug-badge">{{ item.media_type === 'movie' ? 'MOVIE' : 'TV' }}</span>
                <span class="sug-year" *ngIf="item.release_date || item.first_air_date">{{ (item.release_date || item.first_air_date) | slice:0:4 }}</span>
              </div>
            </div>
          </div>
          <div class="suggestion-footer" (click)="onVerTodos()">Ver todos los resultados</div>
        </ng-container>

        <div class="sug-first-load" *ngIf="isLoading && suggestions.length === 0">
          <div class="sug-dots"><span></span><span></span><span></span></div>
          <p class="sug-loading-label">Buscando...</p>
        </div>
      </div>

      <button class="menu-toggle" (click)="toggleMenu()" [class.active]="isMenuOpen">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>
